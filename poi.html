<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Scotland">
  <meta name="referrer" content="no-referrer">
  <title>Scotland Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .hero { position: relative; height: 260px; background: var(--bg2); overflow: hidden; }
    .hero-img { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0.55; transition: opacity 0.3s; }
    body.sunlight .hero-img { opacity: 0.75; }
    .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(15,15,26,0.15) 30%, rgba(15,15,26,0.88) 100%); }
    body.sunlight .hero-overlay { background: linear-gradient(to bottom, rgba(245,240,232,0.1) 30%, rgba(245,240,232,0.85) 100%); }
    .hero-top-bar { position: absolute; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between; padding: calc(0.75rem + var(--safe-top)) 1rem 0.75rem; padding-left: calc(1rem + var(--safe-left)); padding-right: calc(1rem + var(--safe-right)); }
    .hero-back { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(240,237,232,0.85); text-decoration: none; background: rgba(15,15,26,0.55); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); padding: 0 12px; height: 44px; min-width: 44px; border-radius: 22px; border: 1px solid rgba(200,169,110,0.25); touch-action: manipulation; }
    .hero-back svg { width: 14px; height: 14px; flex-shrink: 0; }
    .hero-content { position: absolute; bottom: 1rem; left: 1.25rem; right: 1.25rem; padding-left: var(--safe-left); padding-right: var(--safe-right); }
    .hero-region { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.25rem; }
    .hero-title { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: var(--text); line-height: 1.15; }
    .tags-row { display: flex; gap: 6px; padding: 0.9rem calc(1.25rem + var(--safe-left)); padding-right: calc(1.25rem + var(--safe-right)); border-bottom: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .tags-row::-webkit-scrollbar { display: none; }
    .section { padding: 1rem calc(1.25rem + var(--safe-left)); padding-right: calc(1.25rem + var(--safe-right)); border-bottom: 1px solid var(--border); }
    .section:last-of-type { border-bottom: none; }
    .summary-text { font-size: 14px; color: var(--text2); line-height: 1.7; }
    .dist-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 0.9rem 1rem; display: flex; align-items: center; gap: 12px; min-height: 56px; }
    .dist-arrow { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border2); background: var(--surface2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .dist-arrow svg { width: 16px; height: 16px; transition: transform 0.25s ease-out; }
    .dist-value { font-size: 1.1rem; font-weight: 500; color: var(--accent); }
    .dist-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
    .dist-enable { font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .about-card { border-color: var(--border2); }
    .about-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--accent); }
    .about-icon svg { width: 16px; height: 16px; }
    .trivia-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 0.9rem; }
    .trivia-card-head { display: flex; align-items: center; gap: 10px; padding: 0.9rem 1rem 0.75rem; }
    .trivia-card-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1.3; flex: 1; }
    .trivia-card-body { font-size: 13px; color: var(--text2); line-height: 1.7; padding: 0 1rem 1rem; }
    .trivia-media { margin: 0 1rem 1rem; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
    .trivia-media img { width: 100%; display: block; aspect-ratio: 16/9; object-fit: cover; }
    .trivia-media-caption { padding: 6px 10px; font-size: 10px; color: var(--text3); letter-spacing: 0.05em; border-top: 1px solid var(--border); }
    .visited-btn {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; width: 100%; min-height: 52px;
      border-radius: var(--radius); border: 1.5px solid var(--border2);
      background: none; color: var(--text2);
      font-family: inherit; font-size: 14px; font-weight: 500;
      cursor: pointer; touch-action: manipulation; letter-spacing: 0.03em;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .visited-btn svg { width: 18px; height: 18px; flex-shrink: 0; }
    .visited-btn.done { background: var(--success); border-color: var(--success); color: #0a2e14; }
    .maps-btns { display: flex; gap: 10px; }
    .maps-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 52px; background: none; border: 1px solid var(--border2); border-radius: var(--radius); color: var(--accent); font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; letter-spacing: 0.04em; text-decoration: none; touch-action: manipulation; }
    .maps-btn:active { background: var(--border); }
    .maps-btn svg { width: 15px; height: 15px; flex-shrink: 0; }
    .maps-btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .maps-btn.primary:active { opacity: 0.85; }
  </style>
</head>
<body>

<div class="hero">
  <img class="hero-img" id="hero-img" src="" alt="" referrerpolicy="no-referrer" style="display:none;" onload="this.style.display='block'" onerror="this.style.display='none'">
  <div class="hero-overlay"></div>
  <div class="hero-top-bar">
    <a class="hero-back" id="back-link" href="index.html">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 2L4 7l5 5"/></svg>
      <span id="back-label">Back</span>
    </a>
    <button class="sunlight-btn" onclick="toggleSunlight()" aria-label="Toggle sunlight mode"
      style="background:rgba(15,15,26,0.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41"/></svg>
      <span class="label-dark">Sunlight</span>
      <span class="label-light">Night</span>
    </button>
  </div>
  <div class="hero-content">
    <p class="hero-region" id="hero-region"></p>
    <h1 class="hero-title" id="hero-title">Loading…</h1>
  </div>
</div>

<div class="tags-row" id="tags-row"></div>

<div class="section">
  <p class="section-label">Distance from you</p>
  <div class="dist-card" id="dist-card">
    <div class="dist-enable">
      <span>Enable GPS to see distance &amp; direction</span>
      <button class="btn-sm" onclick="startGPS()">Enable</button>
    </div>
  </div>
</div>

<div class="section">
  <p class="section-label">About &amp; stories</p>
  <div id="trivia-container"></div>
</div>

<div class="section">
  <button id="visited-btn" class="visited-btn" onclick="toggleVisited()">
    <svg viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l4 4 8-8"/>
    </svg>
    <span id="visited-label">Mark as visited</span>
  </button>
</div>

<div class="section">
  <div class="maps-btns">
    <a id="gmaps-link" class="maps-btn primary" href="#" target="_blank" rel="noopener">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 2C5.8 2 4 3.8 4 6c0 3 4 8 4 8s4-5 4-8c0-2.2-1.8-4-4-4z"/><circle cx="8" cy="6" r="1.5"/></svg>
      Google Maps route
    </a>
    <a id="apmaps-link" class="maps-btn" href="#" target="_blank" rel="noopener">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
      Apple Maps
    </a>
  </div>
</div>

<div class="bottom-safe"></div>

<script src="compass.js"></script>
<script>
const params = new URLSearchParams(window.location.search);
const regionSlug = params.get('region');
const poiId = params.get('id');
let poiData = null;
let arrowAngle = 0;

async function init() {
  if (!regionSlug || !poiId) {
    document.getElementById('hero-title').textContent = 'POI not found';
    return;
  }
  try {
    const res = await fetch(`data/${regionSlug}.json`);
    if (!res.ok) throw new Error();
    const region = await res.json();
    poiData = region.pois.find(p => p.id === poiId);
    if (!poiData) throw new Error();

    document.title = `${poiData.name} — Scotland Guide`;
    document.getElementById('hero-title').textContent = poiData.name;
    document.getElementById('hero-region').textContent = region.region;
    document.getElementById('back-label').textContent = region.region;
    document.getElementById('back-link').href = `region.html?region=${regionSlug}`;

    document.getElementById('tags-row').innerHTML =
      poiData.tags.map(t => `<span class="tag ${t}">${t}</span>`).join('');

    updateMapsLinks();
    updateVisitedBtn();
    renderTrivia();   // renders cards instantly, image slots empty
    loadImages();     // fills slots async — never blocks content
  } catch(e) {
    document.getElementById('hero-title').textContent = 'POI not found';
  }
}

// Fetch a high-res thumbnail from Wikipedia.
// The API returns e.g. /320px-filename.jpg — we bump it to 1280px.
async function fetchWikipediaImage(article) {
  try {
    const res = await fetch(
      `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(article)}`,
      { headers: { Accept: 'application/json' } }
    );
    if (!res.ok) return null;
    const data = await res.json();
    if (!data.thumbnail) return null;
    return data.thumbnail.source.replace(/\/\d+px-/, '/1280px-');
  } catch { return null; }
}

// Resolve any media object → image URL.
//   { type: "wikipedia", article: "Edinburgh_Castle", caption: "..." }
//   { type: "url",       url: "images/skyfall.jpg",   caption: "..." }
async function resolveMediaUrl(media) {
  if (!media) return null;
  if (media.type === 'url') return media.url;
  if (media.type === 'wikipedia') return fetchWikipediaImage(media.article);
  return null;
}

function renderTrivia() {
  // About card — uses the POI summary, no badge, no image
  const aboutCard = `<div class="trivia-card about-card">
    <div class="trivia-card-head">
      <span class="about-icon">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <circle cx="8" cy="8" r="6"/><path d="M8 7v4M8 5.5v.5"/>
        </svg>
      </span>
      <span class="trivia-card-title">About</span>
    </div>
    <div class="trivia-card-body">${poiData.summary}</div>
  </div>`;

  // Trivia cards — wikipedia media is hero-only, so only show url-type images in cards
  const triviaCards = poiData.trivia.map(t => {
    const uid = t.title.replace(/\W/g, '').slice(0, 20);
    const showMedia = t.media && t.media.type === 'url';
    const media = showMedia ? `
      <div class="trivia-media" id="media-${uid}" style="display:none;">
        <img id="img-${uid}" alt="${t.media.caption}" loading="lazy"
          onload="document.getElementById('media-${uid}').style.display='block'"
          onerror="document.getElementById('media-${uid}').style.display='none'">
        <div class="trivia-media-caption">${t.media.caption}</div>
      </div>` : '';
    return `<div class="trivia-card">
      <div class="trivia-card-head">
        <span class="trivia-type-badge ${t.type}">${t.type}</span>
        <span class="trivia-card-title">${t.title}</span>
      </div>
      ${media}
      <div class="trivia-card-body">${t.body}</div>
    </div>`;
  }).join('');

  document.getElementById('trivia-container').innerHTML = aboutCard + triviaCards;
}

async function loadImages() {
  const withMedia = poiData.trivia.filter(t => t.media);
  if (!withMedia.length) return;

  // Resolve all URLs in parallel
  const urls = await Promise.all(withMedia.map(t => resolveMediaUrl(t.media)));

  // Inject into trivia cards
  withMedia.forEach((t, i) => {
    if (!urls[i]) return;
    const uid = t.title.replace(/\W/g, '').slice(0, 20);
    const img = document.getElementById(`img-${uid}`);
    if (img) img.src = urls[i];
  });

  // Hero image: prefer wikipedia type (clean location shot) over url type (film still).
  // Falls back to url type if no wikipedia image exists or resolves.
  const heroIdx =
    // First try: a wikipedia entry that resolved successfully
    urls.findIndex((u, i) => u && withMedia[i].media.type === 'wikipedia') ??
    // Fallback: any resolved image
    urls.findIndex(u => u);

  if (heroIdx !== -1 && urls[heroIdx]) {
    const heroImg = document.getElementById('hero-img');
    heroImg.alt = withMedia[heroIdx].media.caption;
    heroImg.src = urls[heroIdx];
  }
}

function updateMapsLinks() {
  if (!poiData) return;
  const dest = `${poiData.lat},${poiData.lng}`;
  const name = encodeURIComponent(poiData.name);
  const origin = GEO.lat ? `&origin=${GEO.lat},${GEO.lng}` : '';
  document.getElementById('gmaps-link').href =
    `https://www.google.com/maps/dir/?api=1&destination=${dest}${origin}&travelmode=walking`;
  document.getElementById('apmaps-link').href =
    `https://maps.apple.com/?daddr=${dest}&dirflg=w&q=${name}`;
}

function updateDist() {
  if (!GEO.lat || !poiData) return;
  const dist = haversine(GEO.lat, GEO.lng, poiData.lat, poiData.lng);
  const abs = getBearing(GEO.lat, GEO.lng, poiData.lat, poiData.lng);
  const rel = relativeBearing(abs);
  const card = document.getElementById('dist-card');
  if (!card.querySelector('.dist-arrow')) {
    card.innerHTML = `
      <div class="dist-arrow">
        <svg id="poi-arrow-svg" viewBox="0 0 16 16" fill="none" stroke="#c8a96e" stroke-width="2" stroke-linecap="round"
             style="transition:transform 0.25s ease-out;">
          <path d="M8 14V2M3 7l5-5 5 5"/>
        </svg>
      </div>
      <div>
        <div class="dist-value" id="dist-value"></div>
        <div class="dist-sub" id="dist-sub"></div>
      </div>`;
    arrowAngle = rel;
    document.getElementById('poi-arrow-svg').style.transform = `rotate(${arrowAngle}deg)`;
  } else {
    let delta = ((rel - arrowAngle) % 360 + 360) % 360;
    if (delta > 180) delta -= 360;
    arrowAngle += delta;
    document.getElementById('poi-arrow-svg').style.transform = `rotate(${arrowAngle}deg)`;
  }
  document.getElementById('dist-value').textContent = formatDist(dist);
  document.getElementById('dist-sub').textContent =
    `bearing ${Math.round(abs)}°${GEO.orientationActive ? ' · compass active' : ''}`;
}

function visitedKey() { return `visited_${regionSlug}`; }
function getVisited() {
  try { return JSON.parse(localStorage.getItem(visitedKey()) || '[]'); } catch { return []; }
}
function toggleVisited() {
  const visited = getVisited();
  const idx = visited.indexOf(poiId);
  if (idx === -1) visited.push(poiId);
  else visited.splice(idx, 1);
  localStorage.setItem(visitedKey(), JSON.stringify(visited));
  updateVisitedBtn();
}
function updateVisitedBtn() {
  const done = getVisited().includes(poiId);
  const btn = document.getElementById('visited-btn');
  const lbl = document.getElementById('visited-label');
  btn.className = 'visited-btn' + (done ? ' done' : '');
  lbl.textContent = done ? 'Visited ✓ — tap to undo' : 'Mark as visited';
}

async function startGPS() {
  const ok = await requestLocationAndCompass();
  if (!ok) showToast('Could not get location — check Settings > Safari > Location');
}

GEO.onUpdate(() => { updateDist(); updateMapsLinks(); });

init();
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/scotland-guide/sw.js").catch(()=>{});}</script>
</body>
</html>
